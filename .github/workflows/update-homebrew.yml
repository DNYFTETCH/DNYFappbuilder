name: Update Homebrew Formula

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v2.0.1)'
        required: true

jobs:
  update-formula:
    name: Update abp.rb
    runs-on: ubuntu-latest

    steps:
      - name: Checkout DNYFappbuilder
        uses: actions/checkout@v4

      - name: Get version and SHA256
        id: info
        run: |
          VERSION="${{ github.event.release.tag_name || github.event.inputs.version }}"
          VERSION="${VERSION#v}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

          # Download tarball and compute sha256
          URL="https://github.com/DNYFTETCH/DNYFappbuilder/archive/refs/tags/v${VERSION}.tar.gz"
          echo "URL=$URL" >> $GITHUB_OUTPUT

          curl -sL "$URL" -o /tmp/release.tar.gz
          SHA256=$(sha256sum /tmp/release.tar.gz | cut -d' ' -f1)
          echo "SHA256=$SHA256" >> $GITHUB_OUTPUT

          echo "✓ Version : $VERSION"
          echo "✓ SHA256  : $SHA256"

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: DNYFTETCH/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        run: |
          VERSION="${{ steps.info.outputs.VERSION }}"
          SHA256="${{ steps.info.outputs.SHA256 }}"
          URL="${{ steps.info.outputs.URL }}"

          FORMULA="homebrew-tap/Formula/abp.rb"

          # Update version, url, sha256
          sed -i "s|version \".*\"|version \"$VERSION\"|g"    "$FORMULA"
          sed -i "s|url \".*\.tar\.gz\"|url \"$URL\"|g"       "$FORMULA"
          sed -i "s|sha256 \".*\"|sha256 \"$SHA256\"|g"       "$FORMULA"

          echo "✓ Updated formula to v$VERSION"
          grep -E "version|url|sha256" "$FORMULA"

      - name: Commit and push formula update
        run: |
          cd homebrew-tap
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/abp.rb
          git commit -m "formula: update abp to v${{ steps.info.outputs.VERSION }}"
          git push
