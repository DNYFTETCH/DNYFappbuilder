name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Create release archive
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          tar --exclude='.git' \
              --exclude='*.log' \
              --exclude='builds/*' \
              --exclude='.cache/*' \
              -czf "DNYFappbuilder-${VERSION}.tar.gz" \
              -C .. DNYFappbuilder/ 2>/dev/null || \
          tar --exclude='.git' \
              --exclude='*.log' \
              -czf "DNYFappbuilder-${VERSION}.tar.gz" .

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")
          if [[ -n "$PREV_TAG" ]]; then
            {
              echo "CHANGES<<EOF"
              git log "$PREV_TAG"..HEAD --pretty=format:"- %s"
              echo ""
              echo "EOF"
            } >> $GITHUB_OUTPUT
          else
            echo "CHANGES=Initial release 🎉" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: "DNYFappbuilder ${{ steps.version.outputs.VERSION }}"
          body: |
            ## What's Changed

            ${{ steps.changelog.outputs.CHANGES }}

            ## Install

            ```bash
            # One-liner (recommended)
            curl -fsSL https://raw.githubusercontent.com/DNYFTECH/DNYFappbuilder/main/install.sh | bash

            # Manual
            git clone https://github.com/DNYFTECH/DNYFappbuilder.git ~/dnyf-appbuilder
            cd ~/dnyf-appbuilder && ./setup.sh
            source ~/.bashrc
            ```

            ## Termux (Android)
            ```bash
            pkg install git
            curl -fsSL https://raw.githubusercontent.com/DNYFTECH/DNYFappbuilder/main/install.sh | bash
            ```

            ## Quick Start
            ```bash
            abp doctor
            abp init myapp flutter
            abp build myapp --target android --sign --install
            ```
          files: "DNYFappbuilder-${{ steps.version.outputs.VERSION }}.tar.gz"
          draft: false
          prerelease: false
