name: Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Versioning ────────────────────────────────────────
      - name: Get version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION="$GITHUB_REF_NAME"
            IS_PRERELEASE="false"
          else
            VERSION="v$(date +'%Y.%m.%d')-$(git rev-parse --short HEAD)"
            IS_PRERELEASE="true"
          fi
          echo "VERSION=$VERSION"             >> "$GITHUB_OUTPUT"
          echo "IS_PRERELEASE=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "✓ Version: $VERSION"

      # ── Skip duplicate releases ───────────────────────────
      - name: Check if release already exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          if gh release view "$VERSION" > /dev/null 2>&1; then
            echo "EXISTS=true"  >> "$GITHUB_OUTPUT"
            echo "⚠ Release $VERSION already exists — skipping"
          else
            echo "EXISTS=false" >> "$GITHUB_OUTPUT"
            echo "✓ Will create release: $VERSION"
          fi

      # ── Create release archive ────────────────────────────
      - name: Create release archive
        if: steps.check.outputs.EXISTS == 'false'
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          ARCHIVE="DNYFappbuilder-${VERSION}.tar.gz"

          tar -czf "$ARCHIVE" \
            --exclude='./.git' \
            --exclude='./.github' \
            --exclude='./builds' \
            --exclude='./.cache' \
            --exclude='./*.tar.gz' \
            --exclude='./node_modules' \
            .

          echo "✓ Archive: $ARCHIVE ($(du -sh "$ARCHIVE" | cut -f1))"

      # ── Generate changelog ────────────────────────────────
      - name: Generate changelog
        id: changelog
        if: steps.check.outputs.EXISTS == 'false'
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null \
            | grep -v "^${{ steps.version.outputs.VERSION }}$" \
            | head -1 || echo "")

          if [[ -n "$PREV_TAG" ]]; then
            {
              echo "CHANGES<<EOF"
              git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" | head -30
              echo ""
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "CHANGES=🎉 Initial release" >> "$GITHUB_OUTPUT"
          fi

      # ── Publish GitHub Release ────────────────────────────
      - name: Create GitHub Release
        if: steps.check.outputs.EXISTS == 'false'
        uses: softprops/action-gh-release@v2
        with:
          name:       "DNYFappbuilder ${{ steps.version.outputs.VERSION }}"
          tag_name:   "${{ steps.version.outputs.VERSION }}"
          prerelease: ${{ steps.version.outputs.IS_PRERELEASE == 'true' }}
          generate_release_notes: false
          body: |
            ## What's Changed

            ${{ steps.changelog.outputs.CHANGES }}

            ---

            ## Install

            ```bash
            # One-liner — Linux / macOS / Termux
            curl -fsSL https://raw.githubusercontent.com/DNYFTETCH/DNYFappbuilder/main/install.sh | bash
            ```

            ```bash
            # Termux (Android)
            pkg install git curl
            curl -fsSL https://raw.githubusercontent.com/DNYFTETCH/DNYFappbuilder/main/install.sh | bash
            ```

            ## Quick Start
            ```bash
            abp doctor --fix
            abp init myapp flutter
            abp build myapp --target android --profile release --sign --install
            ```
          files: "DNYFappbuilder-${{ steps.version.outputs.VERSION }}.tar.gz"
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
