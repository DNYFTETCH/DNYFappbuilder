name: Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── Versioning ────────────────────────────────────────
      - name: Get version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION="$GITHUB_REF_NAME"
            IS_PRERELEASE="false"
          else
            VERSION="v$(date +'%Y.%m.%d')-$(git rev-parse --short HEAD)"
            IS_PRERELEASE="true"
          fi
          echo "VERSION=$VERSION"         >> "$GITHUB_OUTPUT"
          echo "IS_PRERELEASE=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "✓ Version: $VERSION (prerelease: $IS_PRERELEASE)"

      # ── Skip if release already exists ───────────────────
      - name: Check if release already exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          if gh release view "$VERSION" > /dev/null 2>&1; then
            echo "EXISTS=true"  >> "$GITHUB_OUTPUT"
            echo "⚠ Release $VERSION already exists — skipping"
          else
            echo "EXISTS=false" >> "$GITHUB_OUTPUT"
            echo "✓ New release: $VERSION"
          fi

      # ── Keystore (optional) ───────────────────────────────
      - name: Decode keystore
        id: keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [[ -n "${KEYSTORE_BASE64}" ]]; then
            echo "${KEYSTORE_BASE64}" | base64 --decode > /tmp/dnyf-release.keystore
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "✓ Keystore decoded"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "⚠ KEYSTORE_BASE64 not set — skipping signing"
          fi

      # ── Android signing (only if keystore present) ────────
      - name: Set up Android SDK
        if: steps.keystore.outputs.available == 'true'
        uses: android-actions/setup-android@v3

      - name: Sign example APK
        if: steps.keystore.outputs.available == 'true'
        env:
          KEY_ALIAS:      ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:   ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          bash setup.sh --ci --root "$GITHUB_WORKSPACE/dnyf-appbuilder"
          export PATH="$PATH:$GITHUB_WORKSPACE/dnyf-appbuilder/bin"
          export ABP_ROOT="$GITHUB_WORKSPACE/dnyf-appbuilder"
          if [[ -f examples/android-demo.apk ]]; then
            abp sign examples/android-demo.apk \
              --keystore /tmp/dnyf-release.keystore \
              --alias    "$KEY_ALIAS" \
              --password "$KEY_PASSWORD"
            echo "✓ APK signed"
          else
            keytool -list \
              -keystore /tmp/dnyf-release.keystore \
              -storepass "$STORE_PASSWORD" \
              -v 2>/dev/null | head -6
            echo "✓ Keystore verified"
          fi

      # ── Create release archive ────────────────────────────
      - name: Create release archive
        if: steps.check.outputs.EXISTS == 'false'
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          mkdir -p "/tmp/DNYFappbuilder-${VERSION}"
          rsync -a \
            --exclude='.git' \
            --exclude='*.log' \
            --exclude='builds/' \
            --exclude='.cache/' \
            --exclude="DNYFappbuilder-*.tar.gz" \
            . "/tmp/DNYFappbuilder-${VERSION}/"
          tar -czf "DNYFappbuilder-${VERSION}.tar.gz" \
            -C /tmp "DNYFappbuilder-${VERSION}"
          echo "✓ Archive: DNYFappbuilder-${VERSION}.tar.gz ($(du -sh "DNYFappbuilder-${VERSION}.tar.gz" | cut -f1))"

      # ── Generate changelog ────────────────────────────────
      - name: Generate changelog
        id: changelog
        if: steps.check.outputs.EXISTS == 'false'
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [[ -n "$PREV_TAG" ]]; then
            {
              echo "CHANGES<<EOF"
              git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" | head -30
              echo ""
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "CHANGES=Initial release 🎉" >> "$GITHUB_OUTPUT"
          fi

      # ── Publish GitHub Release ────────────────────────────
      - name: Create GitHub Release
        if: steps.check.outputs.EXISTS == 'false'
        uses: softprops/action-gh-release@v1
        with:
          name:       "DNYFappbuilder ${{ steps.version.outputs.VERSION }}"
          tag_name:   "${{ steps.version.outputs.VERSION }}"
          prerelease: ${{ steps.version.outputs.IS_PRERELEASE == 'true' }}
          body: |
            ## What's Changed

            ${{ steps.changelog.outputs.CHANGES }}

            ## Install

            ```bash
            # One-liner (Linux / macOS / Termux)
            curl -fsSL https://raw.githubusercontent.com/DNYFTETCH/DNYFappbuilder/main/install.sh | bash
            ```

            ```bash
            # Termux (Android)
            pkg install git curl
            curl -fsSL https://raw.githubusercontent.com/DNYFTETCH/DNYFappbuilder/main/install.sh | bash
            ```

            ## Quick Start
            ```bash
            abp doctor --fix
            abp init myapp flutter
            abp build myapp --target android --profile release --sign --install
            ```
          files: "DNYFappbuilder-${{ steps.version.outputs.VERSION }}.tar.gz"
          draft: false
