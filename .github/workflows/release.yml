name: Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Step 1: Determine version ─────────────────────────
      - name: Set version
        id: vars
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "PRERELEASE=false"           >> "$GITHUB_OUTPUT"
          else
            SHORT_SHA=$(git rev-parse --short HEAD)
            echo "VERSION=v$(date +'%Y.%m.%d')-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
            echo "PRERELEASE=true"            >> "$GITHUB_OUTPUT"
          fi

      # ── Step 2: Skip if already released ─────────────────
      - name: Check duplicate
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.vars.outputs.VERSION }}"
          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "SKIP=true"  >> "$GITHUB_OUTPUT"
            echo "Already released: $TAG — skipping"
          else
            echo "SKIP=false" >> "$GITHUB_OUTPUT"
            echo "Will release: $TAG"
          fi

      # ── Step 3: Build tarball ─────────────────────────────
      - name: Build archive
        if: steps.check.outputs.SKIP != 'true'
        run: |
          TAG="${{ steps.vars.outputs.VERSION }}"
          git archive \
            --format=tar.gz \
            --prefix="DNYFappbuilder-${TAG}/" \
            HEAD \
            -o "DNYFappbuilder-${TAG}.tar.gz"
          echo "✓ $(ls -lh "DNYFappbuilder-${TAG}.tar.gz" | awk '{print $5, $9}')"

      # ── Step 4: Changelog ─────────────────────────────────
      - name: Changelog
        id: log
        if: steps.check.outputs.SKIP != 'true'
        run: |
          PREV=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [[ -n "$PREV" ]]; then
            CHANGES=$(git log "${PREV}..HEAD" --pretty=format:"- %s" | head -20)
          else
            CHANGES="Initial release"
          fi
          {
            echo "CHANGES<<EOF"
            echo "$CHANGES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # ── Step 5: Publish ───────────────────────────────────
      - name: Publish
        if: steps.check.outputs.SKIP != 'true'
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name:                ${{ steps.vars.outputs.VERSION }}
          name:                    "DNYFappbuilder ${{ steps.vars.outputs.VERSION }}"
          prerelease:              ${{ steps.vars.outputs.PRERELEASE == 'true' }}
          draft:                   false
          fail_on_unmatched_files: false
          files:                   DNYFappbuilder-${{ steps.vars.outputs.VERSION }}.tar.gz
          body: |
            ## What's Changed
            ${{ steps.log.outputs.CHANGES }}

            ---
            ## Install
            ```bash
            curl -fsSL https://raw.githubusercontent.com/DNYFTETCH/DNYFappbuilder/main/install.sh | bash
            ```
            **Termux**
            ```bash
            pkg install git curl
            curl -fsSL https://raw.githubusercontent.com/DNYFTETCH/DNYFappbuilder/main/install.sh | bash
            ```
            ```bash
            abp doctor --fix
            abp init myapp flutter
            abp build myapp --target android --profile release --sign --install
            ```
