name: Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ── Job 1: Test CLI ──────────────────────────────────────
  test-cli:
    name: Test CLI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install DNYFappbuilder
        run: |
          chmod +x setup.sh
          bash setup.sh --ci --root "$GITHUB_WORKSPACE/dnyf-appbuilder"

      - name: Verify CLI
        run: |
          export PATH="$PATH:$GITHUB_WORKSPACE/dnyf-appbuilder/bin"
          export ABP_ROOT="$GITHUB_WORKSPACE/dnyf-appbuilder"
          abp version
          abp help > /dev/null

      - name: Run doctor
        run: |
          export PATH="$PATH:$GITHUB_WORKSPACE/dnyf-appbuilder/bin"
          export ABP_ROOT="$GITHUB_WORKSPACE/dnyf-appbuilder"
          abp doctor || true

      - name: Run test suite
        run: |
          export PATH="$PATH:$GITHUB_WORKSPACE/dnyf-appbuilder/bin"
          export ABP_ROOT="$GITHUB_WORKSPACE/dnyf-appbuilder"
          bash tests/run-tests.sh

  # ── Job 2: Build Node.js Example ─────────────────────────
  build-nodejs:
    name: Build Node.js Example
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install DNYFappbuilder
        run: |
          chmod +x setup.sh
          bash setup.sh --ci --root "$GITHUB_WORKSPACE/dnyf-appbuilder"

      - name: Build Node.js example
        run: |
          export PATH="$PATH:$GITHUB_WORKSPACE/dnyf-appbuilder/bin"
          export ABP_ROOT="$GITHUB_WORKSPACE/dnyf-appbuilder"
          abp build examples/nodejs-api

      - name: Verify build output
        run: ls "$GITHUB_WORKSPACE/dnyf-appbuilder/builds/"

  # ── Job 3: Build Python Example ──────────────────────────
  build-python:
    name: Build Python Example
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install DNYFappbuilder
        run: |
          chmod +x setup.sh
          bash setup.sh --ci --root "$GITHUB_WORKSPACE/dnyf-appbuilder"

      - name: Build Python example
        run: |
          export PATH="$PATH:$GITHUB_WORKSPACE/dnyf-appbuilder/bin"
          export ABP_ROOT="$GITHUB_WORKSPACE/dnyf-appbuilder"
          abp build examples/python-api

      - name: Verify build output
        run: ls "$GITHUB_WORKSPACE/dnyf-appbuilder/builds/"

  # ── Job 4: Build Docker Images ────────────────────────────
  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Node.js Docker image
        run: docker build -f docker/nodejs.Dockerfile -t dnyf-nodejs:test .

      - name: Build Python Docker image
        run: docker build -f docker/python.Dockerfile -t dnyf-python:test .

      - name: Smoke test Node.js container
        run: |
          docker run -d --name dnyf-node-test -p 3000:3000 dnyf-nodejs:test
          sleep 4
          curl -sf http://localhost:3000/health || (docker logs dnyf-node-test && exit 1)
          docker rm -f dnyf-node-test

      - name: Smoke test Python container
        run: |
          docker run -d --name dnyf-python-test -p 8000:8000 dnyf-python:test
          sleep 6
          curl -sf http://localhost:8000/health || (docker logs dnyf-python-test && exit 1)
          docker rm -f dnyf-python-test

  # ── Job 5: Validate Flutter Example ──────────────────────
  validate-flutter:
    name: Validate Flutter Example
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Flutter pub get
        run: |
          cd examples/flutter-app
          flutter pub get

      - name: Flutter analyze
        run: |
          cd examples/flutter-app
          flutter analyze || true

      - name: Flutter test
        run: |
          cd examples/flutter-app
          flutter test || true

  # ── Job 6: Validate React Native Example ─────────────────
  validate-react-native:
    name: Validate React Native Example
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd examples/react-native-app
          npm install --legacy-peer-deps

      - name: TypeScript check
        run: |
          cd examples/react-native-app
          npx tsc --noEmit || true
